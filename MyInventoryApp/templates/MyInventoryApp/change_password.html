{% extends 'MyInventoryApp/base.html' %}
{% load static %}

{% block content %}
<div class="card h-100 col-9">

    <div class="card-header bg-light py-3">
        <h3>Change Password</h3>
    </div>

    <div class="px-3">

        {% if error %}
            <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'change_password' account.id %}">
            {% csrf_token %}
            <div class="row g-3 mt-1">
                <div class="col-12 pb-3">
                    <label for="current_password" class="form-label">Current Password:</label>
                    <input type="password" id="current_password" name="current_password" class="form-control" required oninvalid="this.setCustomValidity('Required input')" oninput="this.setCustomValidity('')">
                </div>
            </div>

            <div class="row g-3">
                <div class="col-12 pb-3">
                    <label for="new_password" class="form-label">New Password:</label>
                    <input type="password" id="new_password" name="new_password" class="form-control" required oninvalid="this.setCustomValidity('Required input')" oninput="this.setCustomValidity('')">
                </div>
            </div>

            <div class="row g-3">
                <div class="col-12 pb-3">
                    <label for="confirm_password" class="form-label">Confirm New Password:</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required oninvalid="this.setCustomValidity('Required input')" oninput="this.setCustomValidity('')">
                </div>
            </div>

            <div class="text-start py-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Confirm</button>
                <a href="{% url 'manage_account' account.id %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

    </div>

</div>
{% endblock %}
